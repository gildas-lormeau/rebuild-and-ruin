<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rebuild & Ruin</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a040">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
  <!-- Mode selector (shown on load) -->
  <div id="mode-select">
    <h1>Rebuild &amp; Ruin</h1>
    <h2>A Rampart Remake</h2>
    <button class="lobby-btn" id="btn-local">Local Play</button>
    <button class="lobby-btn secondary" id="btn-online">Play Online</button>
  </div>

  <!-- Online lobby (hidden until "Play Online" is clicked) -->
  <div id="lobby">
    <h1>Rebuild &amp; Ruin</h1>
    <h2>Online Multiplayer</h2>

    <div id="lobby-menu" class="lobby-section active">
      <div class="setting-row server-row">
        <span class="setting-label">Server</span>
        <input class="lobby-input server-input" id="server-host" type="text"
          placeholder="server host">
      </div>
      <button class="lobby-btn" id="btn-create">Create Room</button>
      <button class="lobby-btn secondary" id="btn-join-show">Join Room</button>
      <button class="lobby-btn secondary" id="btn-online-back">Back</button>
      <div id="room-list" class="room-list"></div>
    </div>

    <div id="lobby-create" class="lobby-section">
      <h2>Room Settings</h2>
      <div class="setting-row">
        <span class="setting-label">Battle Length</span>
        <select class="lobby-select" id="set-rounds">
          <option value="3">3 rounds</option>
          <option value="5">5 rounds</option>
          <option value="8" selected>8 rounds</option>
          <option value="12">12 rounds</option>
          <option value="Infinity">To The Death</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Cannon Durability</span>
        <select class="lobby-select" id="set-hp">
          <option value="3" selected>3 HP</option>
          <option value="6">6 HP</option>
          <option value="9">9 HP</option>
          <option value="12">12 HP</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Wait for Players</span>
        <select class="lobby-select" id="set-wait">
          <option value="2">2 seconds</option>
          <option value="10">10 seconds</option>
          <option value="30">30 seconds</option>
          <option value="60" selected>1 minute</option>
          <option value="90">1.5 minutes</option>
          <option value="120">2 minutes</option>
        </select>
      </div>
      <div class="lobby-actions">
        <button class="lobby-btn" id="btn-create-confirm">Create</button>
        <button class="lobby-btn secondary" id="btn-create-back">Back</button>
      </div>
      <div class="error-msg" id="create-error"></div>
    </div>

    <div id="lobby-join" class="lobby-section">
      <h2>Enter Room Code</h2>
      <input class="lobby-input" id="join-code" type="text" maxlength="4" placeholder="ABCD">
      <div class="lobby-actions">
        <button class="lobby-btn" id="btn-join-confirm">Join</button>
        <button class="lobby-btn secondary" id="btn-join-back">Back</button>
      </div>
      <div class="error-msg" id="join-error"></div>
    </div>
  </div>

  <div id="room-code-overlay"></div>
  <div id="game-container">
    <!-- Landscape: left panel -->
    <aside class="landscape panel-left">
      <div class="panel-top">
        <canvas class="loupe hidden"></canvas>
      </div>
      <div class="panel-bottom">
        <nav class="dpad" aria-label="D-pad">
          <button class="up" data-action="up" aria-label="Up">&#9650;</button>
          <button class="left" data-action="left" aria-label="Left">&#9664;</button>
          <button class="right" data-action="right" aria-label="Right">&#9654;</button>
          <button class="down" data-action="down" aria-label="Down">&#9660;</button>
        </nav>
      </div>
    </aside>

    <!-- Portrait: top bar -->
    <div class="portrait portrait-top">
      <canvas class="loupe hidden"></canvas>
      <button class="btn-round" data-action="quit" aria-label="Quit">X</button>
    </div>

    <!-- Canvas (shared) -->
    <canvas id="canvas"></canvas>

    <!-- Floating buttons for direct-touch placement (hidden by default) -->
    <div class="floating-actions" id="floating-actions">
      <button class="btn-round" data-action="float-rotate" aria-label="Rotate">&#x21bb;</button>
      <button class="btn-round" data-action="float-confirm" aria-label="Place">&#x2713;</button>
    </div>

    <!-- Landscape: right panel -->
    <aside class="landscape panel-right">
      <div class="panel-top">
        <button class="btn-round" data-action="quit" aria-label="Quit">X</button>
      </div>
      <div class="panel-bottom">
        <div class="zoom-group">
          <button class="btn-round" data-action="zoom-home" aria-label="Zoom home">H</button>
          <button class="btn-round" data-action="zoom-enemy" aria-label="Zoom enemy">E</button>
        </div>
        <div class="action-group">
          <button class="btn-round" data-action="rotate" aria-label="Rotate">R</button>
          <button class="btn-round" data-action="confirm" aria-label="Confirm">A</button>
        </div>
      </div>
    </aside>

    <!-- Portrait: bottom bar -->
    <div class="portrait portrait-bottom">
      <nav class="dpad" aria-label="D-pad">
        <button class="up" data-action="up" aria-label="Up">&#9650;</button>
        <button class="left" data-action="left" aria-label="Left">&#9664;</button>
        <button class="right" data-action="right" aria-label="Right">&#9654;</button>
        <button class="down" data-action="down" aria-label="Down">&#9660;</button>
      </nav>
      <div class="controls">
        <div class="zoom-group">
          <button class="btn-round" data-action="zoom-home" aria-label="Zoom home">H</button>
          <button class="btn-round" data-action="zoom-enemy" aria-label="Zoom enemy">E</button>
        </div>
        <div class="action-group">
          <button class="btn-round" data-action="rotate" aria-label="Rotate">R</button>
          <button class="btn-round" data-action="confirm" aria-label="Confirm">A</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/entry.ts"></script>
</body>

</html>
