<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rebuild & Ruin</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a040">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; color: #e0d0b0; }
    canvas { image-rendering: pixelated; display: none; touch-action: none; }

    /* Mode selector */
    #mode-select { text-align: center; }
    #mode-select h1 { font-size: 28px; color: #c8a040; margin-bottom: 8px; }
    #mode-select h2 { font-size: 14px; color: #a08050; margin-bottom: 24px; font-weight: normal; }

    /* Lobby overlay */
    #lobby { max-width: 400px; width: 100%; padding: 32px; text-align: center; display: none; }
    #lobby h1 { font-size: 28px; color: #c8a040; margin-bottom: 8px; }
    #lobby h2 { font-size: 14px; color: #a08050; margin-bottom: 24px; font-weight: normal; }

    .lobby-section { display: none; }
    .lobby-section.active { display: block; }

    .lobby-btn {
      display: inline-block; padding: 10px 24px; margin: 6px;
      background: #c8a040; color: #1a1a2e; border: none; border-radius: 4px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .lobby-btn:hover { background: #f0d870; }
    .lobby-btn:disabled { background: #666; cursor: default; }
    .lobby-btn.secondary { background: #3a3a5e; color: #c8a040; }
    .lobby-btn.secondary:hover { background: #4a4a7e; }

    .lobby-input {
      padding: 10px 16px; margin: 6px; width: 140px;
      background: #2a2a4e; color: #e0d0b0; border: 2px solid #c8a040; border-radius: 4px;
      font-size: 18px; text-align: center; text-transform: uppercase; letter-spacing: 4px;
    }
    .lobby-input::placeholder { color: #666; letter-spacing: 2px; font-size: 14px; }

    .lobby-select {
      padding: 8px 12px; margin: 4px;
      background: #2a2a4e; color: #e0d0b0; border: 1px solid #555; border-radius: 4px;
      font-size: 14px;
    }

    .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    .setting-label { font-size: 14px; color: #a08050; }

    .error-msg { color: #e05050; font-size: 14px; margin: 8px 0; min-height: 20px; }

    .room-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; margin: 4px 0; background: #2a2a4e; border: 1px solid #444;
      border-radius: 4px; cursor: pointer; transition: border-color 0.15s;
    }
    .room-item:hover { border-color: #c8a040; }
    .room-code { font-size: 18px; letter-spacing: 4px; color: #c8a040; font-weight: bold; }
    .room-info { font-size: 12px; color: #a08050; text-align: right; }
    .room-list-title { font-size: 13px; color: #666; margin-bottom: 6px; }
    .room-list-empty { font-size: 13px; color: #555; font-style: italic; }
  </style>
</head>
<body>
  <!-- Mode selector (shown on load) -->
  <div id="mode-select">
    <h1>Rebuild &amp; Ruin</h1>
    <h2>A Rampart Remake</h2>
    <button class="lobby-btn" id="btn-local">Local Play</button>
    <button class="lobby-btn secondary" id="btn-online">Play Online</button>
  </div>

  <!-- Online lobby (hidden until "Play Online" is clicked) -->
  <div id="lobby">
    <h1>Rebuild &amp; Ruin</h1>
    <h2>Online Multiplayer</h2>

    <div id="lobby-menu" class="lobby-section active">
      <div class="setting-row" style="margin-bottom: 16px;">
        <span class="setting-label">Server</span>
        <input class="lobby-input" id="server-host" type="text" style="width: 200px; font-size: 13px; letter-spacing: 0;"
          value="rebuild-and-ruin.gildas-lormeau.deno.net">
      </div>
      <button class="lobby-btn" id="btn-create">Create Room</button>
      <button class="lobby-btn secondary" id="btn-join-show">Join Room</button>
      <button class="lobby-btn secondary" id="btn-online-back">Back</button>
      <div id="room-list" style="margin-top: 20px;"></div>
    </div>

    <div id="lobby-create" class="lobby-section">
      <h2>Room Settings</h2>
      <div class="setting-row">
        <span class="setting-label">Battle Length</span>
        <select class="lobby-select" id="set-rounds">
          <option value="3">3 rounds</option>
          <option value="5">5 rounds</option>
          <option value="8" selected>8 rounds</option>
          <option value="12">12 rounds</option>
          <option value="Infinity">To The Death</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Cannon Durability</span>
        <select class="lobby-select" id="set-hp">
          <option value="3" selected>3 HP</option>
          <option value="6">6 HP</option>
          <option value="9">9 HP</option>
          <option value="12">12 HP</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Wait for Players</span>
        <select class="lobby-select" id="set-wait">
          <option value="2">2 seconds</option>
          <option value="10">10 seconds</option>
          <option value="30">30 seconds</option>
          <option value="60" selected>1 minute</option>
          <option value="90">1.5 minutes</option>
          <option value="120">2 minutes</option>
        </select>
      </div>
      <div style="margin-top: 16px;">
        <button class="lobby-btn" id="btn-create-confirm">Create</button>
        <button class="lobby-btn secondary" id="btn-create-back">Back</button>
      </div>
      <div class="error-msg" id="create-error"></div>
    </div>

    <div id="lobby-join" class="lobby-section">
      <h2>Enter Room Code</h2>
      <input class="lobby-input" id="join-code" type="text" maxlength="4" placeholder="ABCD">
      <div style="margin-top: 12px;">
        <button class="lobby-btn" id="btn-join-confirm">Join</button>
        <button class="lobby-btn secondary" id="btn-join-back">Back</button>
      </div>
      <div class="error-msg" id="join-error"></div>
    </div>
  </div>

  <div id="room-code-overlay"></div>
  <canvas id="canvas"></canvas>

  <script type="module">
    const modeSelect = document.getElementById("mode-select");
    const btnLocal = document.getElementById("btn-local");
    const btnOnline = document.getElementById("btn-online");
    const btnOnlineBack = document.getElementById("btn-online-back");
    const lobby = document.getElementById("lobby");

    // Lock to landscape on mobile (best-effort, silently ignored if unsupported)
    try { screen.orientation?.lock?.("landscape").catch(() => {}); } catch {}

    // Request fullscreen + wake lock on mobile (must be in a user gesture handler)
    function tryFullscreen() {
      if (!("ontouchstart" in window)) return; // only on touch devices
      document.documentElement.requestFullscreen?.().catch(() => {});
      navigator.wakeLock?.request?.("screen").catch(() => {});
    }

    btnLocal.addEventListener("click", async () => {
      tryFullscreen();
      modeSelect.style.display = "none";
      await import("/src/main.ts");
    });

    const serverHostInput = document.getElementById("server-host");
    // Load saved server host (falls back to the default value in HTML)
    const savedHost = localStorage.getItem("castles99_server");
    if (savedHost) serverHostInput.value = savedHost;
    else localStorage.setItem("castles99_server", serverHostInput.value);
    // Save on change
    serverHostInput.addEventListener("change", () => {
      const val = serverHostInput.value.trim();
      if (val) localStorage.setItem("castles99_server", val);
      else localStorage.removeItem("castles99_server");
    });

    btnOnline.addEventListener("click", async () => {
      modeSelect.style.display = "none";
      lobby.style.display = "block";
      await import("/src/online-client.ts");
    });

    // Fullscreen on Create/Join confirm (needs user gesture)
    document.getElementById("btn-create-confirm").addEventListener("click", tryFullscreen);
    document.getElementById("btn-join-confirm").addEventListener("click", tryFullscreen);

    btnOnlineBack.addEventListener("click", () => {
      lobby.style.display = "none";
      modeSelect.style.display = "block";
    });

    // Auto-join via QR code: ?join=XXXX&server=host
    const params = new URLSearchParams(location.search);
    const autoJoinCode = params.get("join");
    if (autoJoinCode) {
      (async () => {
        modeSelect.style.display = "none";
        lobby.style.display = "block";
        await import("/src/online-client.ts");
        // Fill in join code and click join
        const joinCodeInput = document.getElementById("join-code");
        const btnJoinShow = document.getElementById("btn-join-show");
        const btnJoinConfirm = document.getElementById("btn-join-confirm");
        btnJoinShow.click();
        joinCodeInput.value = autoJoinCode.toUpperCase();
        // Small delay to ensure lobby UI is ready
        setTimeout(() => { tryFullscreen(); btnJoinConfirm.click(); }, 300);
      })();
    }

    // Resize canvas to fill viewport while keeping aspect ratio
    const canvas = document.getElementById("canvas");
    const ASPECT = 40 * 16 / (28 * 16); // GRID_COLS * TILE_SIZE / (GRID_ROWS * TILE_SIZE)
    function resizeCanvas() {
      if (canvas.style.display === "none") return;
      const aspect = ASPECT;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let w, h;
      if (vw / vh > aspect) {
        h = vh;
        w = h * aspect;
      } else {
        w = vw;
        h = w / aspect;
      }
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }
    window.addEventListener("resize", resizeCanvas);
    // Also run on display changes via MutationObserver
    new MutationObserver(() => resizeCanvas()).observe(canvas, { attributes: true, attributeFilter: ["style"] });

    // Register service worker in production only (not on dev server)
    if ("serviceWorker" in navigator && !location.port) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
