<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rebuild & Ruin</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a040">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
  <!-- Page: Home -->
  <main id="page-home" class="page" data-route="/">
    <div class="page-content">
      <header>
        <h1>Rebuild &amp; Ruin</h1>
        <p class="subtitle">A Rampart Remake</p>
      </header>
      <nav class="home-actions" aria-label="Play modes">
        <button type="button" class="lobby-btn" id="btn-local">Local Play</button>
        <button type="button" class="lobby-btn secondary" id="btn-online">Play Online</button>
      </nav>
    </div>
  </main>

  <!-- Page: Online Lobby -->
  <main id="page-online" class="page" data-route="/online" hidden>
    <div class="page-content page-content--wide">
      <header class="page-header">
        <h1>Play Online</h1>
        <p class="subtitle">Create or join a multiplayer room</p>
      </header>

      <div class="server-bar">
        <label for="server-host">Server</label>
        <input class="lobby-input" id="server-host" type="text" placeholder="server host">
      </div>

      <div class="lobby-grid">
        <form class="lobby-card" id="form-create" aria-label="Create a room">
          <h2>Create Room</h2>
          <div class="card-body">
            <div class="setting-row">
              <label for="set-rounds" class="setting-label">Battle Length</label>
              <select class="lobby-select" id="set-rounds">
                <option value="1" hidden>1 round</option>
                <option value="3">3 rounds</option>
                <option value="5">5 rounds</option>
                <option value="8" selected>8 rounds</option>
                <option value="12">12 rounds</option>
                <option value="Infinity">To The Death</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="set-hp" class="setting-label">Cannon Durability</label>
              <select class="lobby-select" id="set-hp">
                <option value="3" selected>3 HP</option>
                <option value="6">6 HP</option>
                <option value="9">9 HP</option>
                <option value="12">12 HP</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="set-wait" class="setting-label">Wait for Players</label>
              <select class="lobby-select" id="set-wait">
                <option value="2">2 seconds</option>
                <option value="10">10 seconds</option>
                <option value="30">30 seconds</option>
                <option value="60" selected>1 minute</option>
                <option value="90">1.5 minutes</option>
                <option value="120">2 minutes</option>
              </select>
            </div>
            <button type="submit" class="lobby-btn" id="btn-create-confirm">Create Room</button>
            <output class="error-msg" id="create-error"></output>
          </div>
        </form>

        <form class="lobby-card" id="form-join" aria-label="Join a room">
          <h2>Join Room</h2>
          <div class="card-body card-body--join">
            <p class="card-hint">Enter a 4-letter room code</p>
            <input class="lobby-input room-code-input" id="join-code" type="text"
              maxlength="4" placeholder="ABCD" autocomplete="off" spellcheck="false">
            <button type="submit" class="lobby-btn" id="btn-join-confirm">Join Room</button>
            <output class="error-msg" id="join-error"></output>
          </div>
        </form>
      </div>

      <section class="rooms-section" aria-label="Available rooms">
        <h2>Available Rooms</h2>
        <div id="room-list" class="room-list"></div>
      </section>
    </div>
  </main>

  <div id="room-code-overlay"></div>
  <div id="game-container">
    <!-- Landscape: left panel -->
    <aside class="landscape panel-left">
      <div class="panel-top">
        <canvas class="loupe hidden"></canvas>
      </div>
      <div class="panel-bottom">
        <nav class="dpad" aria-label="D-pad">
          <button class="up" data-action="up" aria-label="Up">&#9650;</button>
          <button class="left" data-action="left" aria-label="Left">&#9664;</button>
          <button class="right" data-action="right" aria-label="Right">&#9654;</button>
          <button class="down" data-action="down" aria-label="Down">&#9660;</button>
        </nav>
      </div>
    </aside>

    <!-- Portrait: top bar -->
    <div class="portrait portrait-top">
      <canvas class="loupe hidden"></canvas>
      <button class="btn-round" data-action="quit" aria-label="Quit">X</button>
    </div>

    <!-- Canvas (shared) -->
    <canvas id="canvas"></canvas>

    <!-- Floating buttons for direct-touch placement (hidden by default) -->
    <div class="floating-actions" id="floating-actions">
      <button class="btn-round" data-action="float-rotate" aria-label="Rotate">&#x21bb;</button>
      <button class="btn-round" data-action="float-confirm" aria-label="Place">&#x2713;</button>
    </div>

    <!-- Landscape: right panel -->
    <aside class="landscape panel-right">
      <div class="panel-top">
        <button class="btn-round" data-action="quit" aria-label="Quit">X</button>
      </div>
      <div class="panel-bottom">
        <div class="zoom-group">
          <button class="btn-round" data-action="zoom-home" aria-label="Zoom home">H</button>
          <button class="btn-round" data-action="zoom-enemy" aria-label="Zoom enemy">E</button>
        </div>
        <div class="action-group">
          <button class="btn-round" data-action="rotate" aria-label="Rotate">R</button>
          <button class="btn-round" data-action="confirm" aria-label="Confirm">A</button>
        </div>
      </div>
    </aside>

    <!-- Portrait: bottom bar -->
    <div class="portrait portrait-bottom">
      <nav class="dpad" aria-label="D-pad">
        <button class="up" data-action="up" aria-label="Up">&#9650;</button>
        <button class="left" data-action="left" aria-label="Left">&#9664;</button>
        <button class="right" data-action="right" aria-label="Right">&#9654;</button>
        <button class="down" data-action="down" aria-label="Down">&#9660;</button>
      </nav>
      <div class="controls">
        <div class="zoom-group">
          <button class="btn-round" data-action="zoom-home" aria-label="Zoom home">H</button>
          <button class="btn-round" data-action="zoom-enemy" aria-label="Zoom enemy">E</button>
        </div>
        <div class="action-group">
          <button class="btn-round" data-action="rotate" aria-label="Rotate">R</button>
          <button class="btn-round" data-action="confirm" aria-label="Confirm">A</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/entry.ts"></script>
</body>

</html>
