<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rebuild & Ruin</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a040">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --color-bg: #1a1a2e;
      --btn-size: min(48px, 7.5vmin);
      --gap: 2vmin;
      --safe-padding: calc(var(--gap) * 2);
      --panel-size: clamp(calc(var(--btn-size) * 3 + var(--safe-padding) * 2), 20vw, 200px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--color-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      font-family: sans-serif;
      color: #e0d0b0;
    }

    /* Shared button base */
    #game-container button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .btn-round {
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 50%;
      border: 2px solid #666;
      background: #3a3a5e;
      color: #ccc;
      font-size: min(14px, 2.2vmin);
      font-weight: bold;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    [data-action="confirm"] {
      background: #4a7a4a;
      border-color: #6a9a6a;
    }

    [data-action="rotate"] {
      background: #7a7a3a;
      border-color: #9a9a5a;
    }

    [data-action="quit"] {
      background: #7a3a3a;
      border-color: #9a5a5a;
    }

    [data-action="zoom-home"] {
      background: #3a5a7a;
      border-color: #5a7a9a;
    }

    [data-action="zoom-enemy"] {
      background: #7a3a5a;
      border-color: #9a5a7a;
    }

    /* D-pad */
    nav {
      display: grid;
      grid-template: repeat(3, var(--btn-size)) / repeat(3, var(--btn-size));
      gap: 0;

      button {
        border-radius: 1vmin;
        background: #3a4a5e;
        border: 2px solid #5a6a7e;
        color: #c0d0e0;
        font-size: min(16px, 2.5vmin);
        font-weight: bold;
        display: grid;
        place-items: center;
      }

      .up {
        grid-area: 1 / 2;
      }

      .left {
        grid-area: 2 / 1;
      }

      .right {
        grid-area: 2 / 3;
      }

      .down {
        grid-area: 3 / 2;
      }
    }

    /* Loupe */
    .loupe {
      background: #2a2a3e;
      border: 3px solid #555;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .zoom-group {
      display: flex;
      gap: var(--gap);
    }

    .action-group {
      display: flex;
      gap: var(--gap);
    }

    /* Press / disabled / hidden states */
    .pressed { transform: scale(0.88); opacity: 0.75; }
    .disabled { opacity: 0.3; pointer-events: none; }
    .disabled button { pointer-events: none; }
    .hidden { visibility: hidden; }

    /* ===== Game container ===== */
    #game-container {
      display: none;
      width: 100vw;
      height: 100dvh;

      canvas:not(.loupe) {
        flex: 1;
        min-width: 0;
        min-height: 0;
        object-fit: contain;
        image-rendering: pixelated;
        touch-action: none;
        background: #2a2a4e;
      }
    }

    #game-container.active {
      display: flex;
    }

    .left-handed {
      flex-direction: row-reverse;
    }

    /* ===== Landscape layout ===== */

    /* Panels use --gap as base padding (loupe-friendly).
       .panel-top / .panel-bottom add extra padding for interactive elements
       so they reach --safe-padding from the viewport edge. */
    .landscape {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--color-bg);
      gap: var(--gap);

      .panel-top {
        display: flex;
        flex-direction: column;
        gap: var(--gap);
      }

      .panel-bottom {
        display: flex;
        flex-direction: column;
        gap: var(--safe-padding);
      }
    }

    .has-touch-panels > .landscape {
      display: flex;
    }

    .landscape.panel-left {
      align-items: start;
      width: var(--panel-size);
      padding: var(--gap);
      container-type: size;

      .panel-bottom {
        padding-block-end: var(--gap);
        padding-inline-start: var(--gap);
      }
    }

    .landscape.panel-right {
      align-items: center;
      width: auto;
      padding: var(--safe-padding);
    }

    .landscape .loupe {
      /* Available height = container block size - dpad height - panel-bottom padding - panel gap */
      --dpad-h: calc(var(--btn-size) * 3);
      --bottom-pad: var(--gap);
      --available-h: calc(100cqb - var(--dpad-h) - var(--bottom-pad) - var(--gap));
      --loupe-w: min(100cqi, calc(var(--available-h) * 5 / 6));
      width: var(--loupe-w);
      height: calc(var(--loupe-w) * 6 / 5);
    }

    .landscape .zoom-group {
      flex-direction: column;
    }

    .landscape .action-group {
      flex-direction: column;
    }

    /* ===== Portrait layout ===== */
    .portrait {
      display: none;
    }

    @media (orientation: portrait) {
      .has-touch-panels > .landscape {
        display: none;
      }

      .has-touch-panels > .portrait {
        display: flex;
      }

      .has-touch-panels {
        flex-direction: column;
      }

      .has-touch-panels.left-handed > .portrait-top,
      .has-touch-panels.left-handed > .portrait-bottom {
        flex-direction: row-reverse;
      }

      #game-container canvas:not(.loupe) {
        flex: 2;
      }

      /* Top bar: loupe fills available height via flex distribution */
      .portrait-top {
        flex: 1 0 0;
        min-height: 0;
        flex-direction: row;
        justify-content: space-between;
        align-items: start;
        padding: var(--gap);
        gap: var(--gap);

        .loupe {
          align-self: stretch;
          aspect-ratio: 5 / 6;
          width: auto;
        }

        .btn-round {
          margin: var(--gap);
        }
      }

      /* Bottom bar: all interactive, use --safe-padding */
      .portrait-bottom {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: var(--safe-padding);
        gap: var(--gap);
        flex-shrink: 0;

        .zoom-group {
          flex-direction: row;
        }

        .action-group {
          flex-direction: row;
        }

        .controls {
          display: flex;
          gap: var(--safe-padding);
          align-items: center;
        }
      }
    }

    /* ===== Mode selector ===== */
    #mode-select { text-align: center; }
    #mode-select h1 { font-size: 28px; color: #c8a040; margin-bottom: 8px; }
    #mode-select h2 { font-size: 14px; color: #a08050; margin-bottom: 24px; font-weight: normal; }

    /* ===== Lobby overlay ===== */
    #lobby { max-width: 400px; width: 100%; padding: 32px; text-align: center; display: none; }
    #lobby h1 { font-size: 28px; color: #c8a040; margin-bottom: 8px; }
    #lobby h2 { font-size: 14px; color: #a08050; margin-bottom: 24px; font-weight: normal; }

    .lobby-section { display: none; }
    .lobby-section.active { display: block; }

    .lobby-btn {
      display: inline-block; padding: 10px 24px; margin: 6px;
      background: #c8a040; color: #1a1a2e; border: none; border-radius: 4px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .lobby-btn:hover { background: #f0d870; }
    .lobby-btn:disabled { background: #666; cursor: default; }
    .lobby-btn.secondary { background: #3a3a5e; color: #c8a040; }
    .lobby-btn.secondary:hover { background: #4a4a7e; }

    .lobby-input {
      padding: 10px 16px; margin: 6px; width: 140px;
      background: #2a2a4e; color: #e0d0b0; border: 2px solid #c8a040; border-radius: 4px;
      font-size: 18px; text-align: center; text-transform: uppercase; letter-spacing: 4px;
    }
    .lobby-input::placeholder { color: #666; letter-spacing: 2px; font-size: 14px; }

    .lobby-select {
      padding: 8px 12px; margin: 4px;
      background: #2a2a4e; color: #e0d0b0; border: 1px solid #555; border-radius: 4px;
      font-size: 14px;
    }

    .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    .setting-row.server-row { margin-bottom: 16px; }
    .setting-label { font-size: 14px; color: #a08050; }
    .server-input { width: 200px; font-size: 13px; letter-spacing: 0; }
    .room-list { margin-top: 20px; }
    .lobby-actions { margin-top: 16px; }

    .error-msg { color: #e05050; font-size: 14px; margin: 8px 0; min-height: 20px; }

    .room-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; margin: 4px 0; background: #2a2a4e; border: 1px solid #444;
      border-radius: 4px; cursor: pointer; transition: border-color 0.15s;
    }
    .room-item:hover { border-color: #c8a040; }
    .room-code { font-size: 18px; letter-spacing: 4px; color: #c8a040; font-weight: bold; }
    .room-info { font-size: 12px; color: #a08050; text-align: right; }
    .room-list-title { font-size: 13px; color: #666; margin-bottom: 6px; }
    .room-list-empty { font-size: 13px; color: #555; font-style: italic; }
  </style>
</head>

<body>
  <!-- Mode selector (shown on load) -->
  <div id="mode-select">
    <h1>Rebuild &amp; Ruin</h1>
    <h2>A Rampart Remake</h2>
    <button class="lobby-btn" id="btn-local">Local Play</button>
    <button class="lobby-btn secondary" id="btn-online">Play Online</button>
  </div>

  <!-- Online lobby (hidden until "Play Online" is clicked) -->
  <div id="lobby">
    <h1>Rebuild &amp; Ruin</h1>
    <h2>Online Multiplayer</h2>

    <div id="lobby-menu" class="lobby-section active">
      <div class="setting-row server-row">
        <span class="setting-label">Server</span>
        <input class="lobby-input server-input" id="server-host" type="text"
          placeholder="server host">
      </div>
      <button class="lobby-btn" id="btn-create">Create Room</button>
      <button class="lobby-btn secondary" id="btn-join-show">Join Room</button>
      <button class="lobby-btn secondary" id="btn-online-back">Back</button>
      <div id="room-list" class="room-list"></div>
    </div>

    <div id="lobby-create" class="lobby-section">
      <h2>Room Settings</h2>
      <div class="setting-row">
        <span class="setting-label">Battle Length</span>
        <select class="lobby-select" id="set-rounds">
          <option value="3">3 rounds</option>
          <option value="5">5 rounds</option>
          <option value="8" selected>8 rounds</option>
          <option value="12">12 rounds</option>
          <option value="Infinity">To The Death</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Cannon Durability</span>
        <select class="lobby-select" id="set-hp">
          <option value="3" selected>3 HP</option>
          <option value="6">6 HP</option>
          <option value="9">9 HP</option>
          <option value="12">12 HP</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Wait for Players</span>
        <select class="lobby-select" id="set-wait">
          <option value="2">2 seconds</option>
          <option value="10">10 seconds</option>
          <option value="30">30 seconds</option>
          <option value="60" selected>1 minute</option>
          <option value="90">1.5 minutes</option>
          <option value="120">2 minutes</option>
        </select>
      </div>
      <div class="lobby-actions">
        <button class="lobby-btn" id="btn-create-confirm">Create</button>
        <button class="lobby-btn secondary" id="btn-create-back">Back</button>
      </div>
      <div class="error-msg" id="create-error"></div>
    </div>

    <div id="lobby-join" class="lobby-section">
      <h2>Enter Room Code</h2>
      <input class="lobby-input" id="join-code" type="text" maxlength="4" placeholder="ABCD">
      <div class="lobby-actions">
        <button class="lobby-btn" id="btn-join-confirm">Join</button>
        <button class="lobby-btn secondary" id="btn-join-back">Back</button>
      </div>
      <div class="error-msg" id="join-error"></div>
    </div>
  </div>

  <div id="room-code-overlay"></div>
  <div id="game-container">
    <!-- Landscape: left panel -->
    <aside class="landscape panel-left">
      <div class="panel-top">
        <canvas class="loupe hidden"></canvas>
      </div>
      <div class="panel-bottom">
        <nav class="dpad" aria-label="D-pad">
          <button class="up" data-action="up" aria-label="Up">&#9650;</button>
          <button class="left" data-action="left" aria-label="Left">&#9664;</button>
          <button class="right" data-action="right" aria-label="Right">&#9654;</button>
          <button class="down" data-action="down" aria-label="Down">&#9660;</button>
        </nav>
      </div>
    </aside>

    <!-- Portrait: top bar -->
    <div class="portrait portrait-top">
      <canvas class="loupe hidden"></canvas>
      <button class="btn-round" data-action="quit" aria-label="Quit">X</button>
    </div>

    <!-- Canvas (shared) -->
    <canvas id="canvas"></canvas>

    <!-- Landscape: right panel -->
    <aside class="landscape panel-right">
      <div class="panel-top">
        <button class="btn-round" data-action="quit" aria-label="Quit">X</button>
      </div>
      <div class="panel-bottom">
        <div class="zoom-group">
          <button class="btn-round" data-action="zoom-home" aria-label="Zoom home">H</button>
          <button class="btn-round" data-action="zoom-enemy" aria-label="Zoom enemy">E</button>
        </div>
        <div class="action-group">
          <button class="btn-round" data-action="rotate" aria-label="Rotate">R</button>
          <button class="btn-round" data-action="confirm" aria-label="Confirm">A</button>
        </div>
      </div>
    </aside>

    <!-- Portrait: bottom bar -->
    <div class="portrait portrait-bottom">
      <nav class="dpad" aria-label="D-pad">
        <button class="up" data-action="up" aria-label="Up">&#9650;</button>
        <button class="left" data-action="left" aria-label="Left">&#9664;</button>
        <button class="right" data-action="right" aria-label="Right">&#9654;</button>
        <button class="down" data-action="down" aria-label="Down">&#9660;</button>
      </nav>
      <div class="controls">
        <div class="zoom-group">
          <button class="btn-round" data-action="zoom-home" aria-label="Zoom home">H</button>
          <button class="btn-round" data-action="zoom-enemy" aria-label="Zoom enemy">E</button>
        </div>
        <div class="action-group">
          <button class="btn-round" data-action="rotate" aria-label="Rotate">R</button>
          <button class="btn-round" data-action="confirm" aria-label="Confirm">A</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const modeSelect = document.getElementById("mode-select");
    const btnLocal = document.getElementById("btn-local");
    const btnOnline = document.getElementById("btn-online");
    const btnOnlineBack = document.getElementById("btn-online-back");
    const lobby = document.getElementById("lobby");

    // Lock to landscape on mobile (best-effort, silently ignored if unsupported)
    try { screen.orientation?.lock?.("landscape").catch(() => {}); } catch {}

    // Request fullscreen + wake lock on mobile (must be in a user gesture handler)
    function tryFullscreen() {
      if (!("ontouchstart" in window)) return; // only on touch devices
      if (location.port) return; // skip in dev mode (Vite dev server)
      document.documentElement.requestFullscreen?.().catch(() => {});
      navigator.wakeLock?.request?.("screen").catch(() => {});
    }

    btnLocal.addEventListener("click", async () => {
      tryFullscreen();
      modeSelect.style.display = "none";
      await import("/src/main.ts");
    });

    const serverHostInput = document.getElementById("server-host");
    // Save on change
    serverHostInput.addEventListener("change", () => {
      const val = serverHostInput.value.trim();
      if (val) localStorage.setItem("castles99_server", val);
      else localStorage.removeItem("castles99_server");
    });

    btnOnline.addEventListener("click", async () => {
      serverHostInput.value = localStorage.getItem("castles99_server") || "rebuild-and-ruin.gildas-lormeau.deno.net";
      modeSelect.style.display = "none";
      lobby.style.display = "block";
      await import("/src/online-client.ts");
    });

    // Fullscreen on Create/Join confirm (needs user gesture)
    document.getElementById("btn-create-confirm").addEventListener("click", tryFullscreen);
    document.getElementById("btn-join-confirm").addEventListener("click", tryFullscreen);

    btnOnlineBack.addEventListener("click", () => {
      lobby.style.display = "none";
      modeSelect.style.display = "block";
    });

    const params = new URLSearchParams(location.search);

    // Input recorder: ?record-inputs activates DOM event capture
    if (params.has("record-inputs")) {
      import("/src/input-recorder.ts").then(m => m.initRecorder());
    }

    // Auto-join via QR code: ?join=XXXX&server=host
    const autoJoinCode = params.get("join");
    if (autoJoinCode) {
      (async () => {
        modeSelect.style.display = "none";
        lobby.style.display = "block";
        await import("/src/online-client.ts");
        // Fill in join code and click join
        const joinCodeInput = document.getElementById("join-code");
        const btnJoinShow = document.getElementById("btn-join-show");
        const btnJoinConfirm = document.getElementById("btn-join-confirm");
        btnJoinShow.click();
        joinCodeInput.value = autoJoinCode.toUpperCase();
        // Small delay to ensure lobby UI is ready
        setTimeout(() => { tryFullscreen(); btnJoinConfirm.click(); }, 300);
      })();
    }

    // Register service worker in production only (not on dev server)
    if ("serviceWorker" in navigator && !location.port) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>

</html>
